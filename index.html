<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,500;1,400&display=swap');
        *{
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }
        .container{
            display: flex;
        }
        .box{
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            background: #eee;
        }
        form{
            text-align: center;
            height: 500px;
            margin: 50px;
            background:#fff;
            border-radius: 2px;
            padding: 30px;
            box-shadow: rgba(0, 0, 0, 0.15) 1.95px 1.95px 2.6px;
        }
        input[type='text']{
            padding: 8px;
            width: 200px;
            margin: 5px;
            border-radius: 2px;
            border: 1px solid white;
            outline: none;
            margin: 10px;
            background: #eee;
        }
        input[type='password']{
            padding: 8px;
            width: 200px;
            margin: 5px;
            border-radius: 2px;
            border: 1px solid white;
            outline: none;
            margin: 10px;
            background: #eee;
        }
        button{
            padding: 8px;
            width: 220px;
            margin: 5px;
            border-radius: 2px;
            border: 1px solid white;
            outline: none;
            margin: 20px;
            background: skyblue;
        }
        a{
            margin: 30px;
            color: skyblue;
        }
        hr{
            margin-bottom: 10px;
        }
        input:hover{
            border: 1px solid skyblue;
        }
        p{
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="contaier">
        <span class="box">
            <form>
                <h1>Instagram</h1>
                <br>
                <input type="text" placeholder="Enter phone number or email" required>
                <br>                
                <input type="password" placeholder="Passowrd?" required>   
                <br>
                <button>Log in</button>             
                <hr>OR<hr>
                <a href="#">Log in with Facebook</a>
                <br>
                <a href="#">Forgot Passowrd?</a>
                <span>
                    <p>Don't have an account? <br> <a href="#">Sign up</a></p>
                </span>
            </form>
        </span>
    </div>
</body>
</html>
